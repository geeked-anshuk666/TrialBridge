services:
  - type: web
    name: trialbridge-api
    runtime: docker
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: AI_RATE_LIMIT
        value: "20"
      - key: AI_RATE_WINDOW_SECONDS
        value: "3600"
